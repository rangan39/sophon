services:
  interp-api:
    profiles: ["legacy-interpretability"]
    build:
      context: ./services/interp-api
      dockerfile: Dockerfile
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    environment:
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:3000}
      AUTH_TOKEN: ${AUTH_TOKEN:-}
      HF_HOME: /cache/huggingface
      TRANSFORMERS_CACHE: /cache/huggingface/transformers
      TORCH_HOME: /cache/torch
    volumes:
      - ./services/interp-api:/app
      - huggingface_cache:/cache/huggingface
      - torch_cache:/cache/torch
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    command: ["uvicorn", "sophon_interp.api:create_app", "--factory", "--host", "0.0.0.0", "--port", "8000", "--reload"]

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      target: development
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    environment:
      NEXT_TELEMETRY_DISABLED: "1"
    volumes:
      - .:/app
      - frontend_node_modules:/app/node_modules
      - frontend_next:/app/.next

volumes:
  frontend_node_modules:
  frontend_next:
  huggingface_cache:
  torch_cache:
